<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Chispa - Menú Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yakimechi: #ff6a00; }
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .accent-font { font-family: 'Bebas Neue', cursive; }
        
        .category-header { background: #111; border-bottom: 1px solid #222; transition: all 0.3s; }
        .category-header.active { background: #1a1a1a; border-bottom: 2px solid var(--yakimechi); }
        .product-list { display: none; background: #0a0a0a; }

        .qty-control { display: flex; align-items: center; gap: 12px; background: #1a1a1a; padding: 4px 8px; border-radius: 12px; border: 1px solid #333; }
        .btn-action { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; color: var(--yakimechi); transition: 0.2s; }
        .btn-action:active { transform: scale(0.9); }
        .btn-action:disabled { opacity: 0.1; cursor: not-allowed; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: var(--yakimechi); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s ease-out; }

        #cart-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 94%; max-width: 450px; background: var(--yakimechi); border-radius: 15px; display: none; z-index: 100; box-shadow: 0 8px 25px rgba(255, 106, 0, 0.4); }
        .arrow { transition: transform 0.3s; }
        .active .arrow { transform: rotate(180deg); }
        
        select { outline: none; transition: border 0.2s; }
        select:focus { border-color: var(--yakimechi) !important; }
    </style>
</head>
<body>

    <header class="py-8 text-center px-4">
        <h1 class="accent-font text-5xl text-orange-500">LA CHISPA</h1>
        <p class="text-[10px] tracking-widest text-gray-500 uppercase font-bold">Menú Digital · Sabor de Querétaro</p>
    </header>

    <main id="contenedor-menu" class="pb-40"></main>

    <div id="cart-bar" class="p-4 shadow-2xl border border-white/10">
        <div class="flex justify-between items-center text-black">
            <div class="flex items-center gap-2">
                <button onclick="clearCart()" class="bg-black/10 p-2 rounded-lg hover:bg-black/20 transition-colors">
                    🗑️
                </button>
                <div>
                    <span id="items-count" class="font-black bg-black/20 px-2 py-1 rounded text-xs">0</span>
                    <span id="total-val" class="text-xl font-black ml-1">$0.00</span>
                </div>
            </div>
            <button onclick="sendWhatsApp()" class="font-black uppercase text-xs border-2 border-black px-4 py-2 rounded-lg bg-white/10 active:bg-black active:text-white transition-all">
                PEDIR AHORA
            </button>
        </div>
    </div>

    <script>
        let globalProductos = [];

        async function cargarMenu() {
            try {
                const respuesta = await fetch('productos.json');
                globalProductos = await respuesta.json();
                const contenedor = document.getElementById('contenedor-menu');
                
                // Unificamos categorías a Mayúsculas para evitar duplicados
                const categorias = [...new Set(globalProductos.map(p => p.categoria.toUpperCase()))];

                categorias.forEach(cat => {
                    const section = document.createElement('div');
                    section.className = "mb-2";
                    const catId = cat.replace(/\s+/g, '-');

                    section.innerHTML = `
                        <button onclick="toggleCategory('${catId}')" id="btn-${catId}" class="category-header w-full p-5 flex justify-between items-center">
                            <span class="accent-font text-2xl tracking-wide uppercase text-gray-200">${cat}</span>
                            <span class="arrow text-orange-500">▼</span>
                        </button>
                        <div id="list-${catId}" class="product-list px-4 divide-y divide-white/5"></div>
                    `;

                    const list = section.querySelector(`#list-${catId}`);
                    globalProductos.filter(p => p.categoria.toUpperCase() === cat).forEach(p => {
                        
                        // Lógica de Selectores para Paquetes
                        let selectoresHTML = '';
                        const esPaquete = p.categoria.toUpperCase() === 'PAQUETES';
                        
                        if (esPaquete && (p.nombre.toLowerCase().includes('crepa'))) {
                            const esDulce = p.nombre.toLowerCase().includes('dulce');
                            const crepas = globalProductos.filter(item => 
                                item.categoria.toUpperCase() === (esDulce ? 'CREPAS DULCES' : 'CREPAS SALADAS')
                            );
                            const bebidas = globalProductos.filter(item => item.categoria.toUpperCase() === 'BEBIDAS');

                            selectoresHTML = `
                                <div class="mt-3 space-y-2 p-3 bg-black/40 rounded-lg border border-white/5 selector-area hidden">
                                    <p class="text-[9px] uppercase font-black text-orange-400 mb-1">Elige tus sabores:</p>
                                    <select class="w-full bg-gray-900 text-white text-[11px] p-2 rounded border border-gray-800 sel-crepa">
                                        <option value="">-- Selecciona la Crepa --</option>
                                        ${crepas.map(o => `<option value="${o.nombre}">${o.nombre}</option>`).join('')}
                                    </select>
                                    <select class="w-full bg-gray-900 text-white text-[11px] p-2 rounded border border-gray-800 sel-bebida">
                                        <option value="">-- Selecciona la Bebida --</option>
                                        ${bebidas.map(o => `<option value="${o.nombre}">${o.nombre}</option>`).join('')}
                                    </select>
                                </div>
                            `;
                        }

                        list.innerHTML += `
                            <div class="py-5 menu-item" data-name="${p.nombre}" data-price="${p.precio}" data-stock="${p.stock}">
                                <div class="flex justify-between items-start">
                                    <div class="pr-4 flex-1">
                                        <h3 class="font-bold text-sm uppercase text-white">${p.nombre}</h3>
                                        <p class="text-[10px] text-gray-500 mt-1 leading-relaxed">${p.descripcion || ''}</p>
                                        <div class="flex items-center gap-3 mt-2">
                                            <p class="font-black text-orange-500">$${p.precio}</p>
                                            ${p.stock < 10 ? `<span class="text-[9px] bg-red-900/20 text-red-400 px-2 py-0.5 rounded border border-red-900/30">Solo ${p.stock} disp.</span>` : ''}
                                        </div>
                                    </div>
                                    <div class="qty-control">
                                        <button onclick="changeQty(this, -1)" class="btn-action" style="opacity: 0.1" disabled>-</button>
                                        <span class="qty-val font-bold text-sm min-w-[20px] text-center">0</span>
                                        <button onclick="changeQty(this, 1)" class="btn-action">+</button>
                                    </div>
                                </div>
                                ${selectoresHTML}
                            </div>
                        `;
                    });
                    contenedor.appendChild(section);
                });
            } catch (e) { console.error("Error cargando menú:", e); }
        }

        function toggleCategory(id) {
            const list = document.getElementById(`list-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            const isVisible = list.style.display === 'block';
            list.style.display = isVisible ? 'none' : 'block';
            btn.classList.toggle('active', !isVisible);
        }

        function changeQty(btn, delta) {
            const card = btn.closest('.menu-item');
            const valSpan = card.querySelector('.qty-val');
            const minusBtn = card.querySelector('.btn-action:first-child');
            const plusBtn = card.querySelector('.btn-action:last-child');
            const selectorArea = card.querySelector('.selector-area');
            
            const stockMax = parseInt(card.dataset.stock);
            let current = parseInt(valSpan.innerText) + delta;
            
            if(current < 0) current = 0;
            if(current > stockMax) current = stockMax;

            valSpan.innerText = current;
            
            // Animación
            valSpan.classList.remove('animate-pop');
            void valSpan.offsetWidth;
            valSpan.classList.add('animate-pop');

            // Estados
            minusBtn.disabled = current === 0;
            minusBtn.style.opacity = current === 0 ? "0.1" : "1";
            plusBtn.disabled = current >= stockMax;
            plusBtn.style.opacity = current >= stockMax ? "0.1" : "1";

            if(selectorArea) selectorArea.classList.toggle('hidden', current === 0);
            
            updateTotal();
        }

        function clearCart() {
            if(confirm("¿Vaciar todo el carrito?")) {
                document.querySelectorAll('.qty-val').forEach(v => v.innerText = "0");
                document.querySelectorAll('.selector-area').forEach(a => a.classList.add('hidden'));
                document.querySelectorAll('.btn-action:first-child').forEach(b => { b.disabled = true; b.style.opacity = "0.1"; });
                document.querySelectorAll('.btn-action:last-child').forEach(b => { b.disabled = false; b.style.opacity = "1"; });
                updateTotal();
            }
        }

        function updateTotal() {
            let total = 0, count = 0;
            document.querySelectorAll('.menu-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty-val').innerText);
                if(qty > 0) {
                    total += (parseFloat(item.dataset.price) * qty);
                    count += qty;
                }
            });
            document.getElementById('total-val').innerText = `$${total.toFixed(2)}`;
            document.getElementById('items-count').innerText = count;
            document.getElementById('cart-bar').style.display = count > 0 ? 'block' : 'none';
        }

        function sendWhatsApp() {
            let msg = "✨ *NUEVO PEDIDO LA CHISPA* ✨\n━━━━━━━━━━━━━━━━━━━━\n\n";
            let valid = true;

            document.querySelectorAll('.menu-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty-val').innerText);
                if(qty > 0) {
                    msg += `🔸 *${qty}x* ${item.dataset.name}\n`;
                    
                    const sCrepa = item.querySelector('.sel-crepa');
                    const sBebida = item.querySelector('.sel-bebida');
                    
                    if(sCrepa || sBebida) {
                        if(!sCrepa?.value || !sBebida?.value) {
                            valid = false;
                            item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        } else {
                            msg += `   └ Crepa: ${sCrepa.value}\n`;
                            msg += `   └ Bebida: ${sBebida.value}\n`;
                        }
                    }
                }
            });

            if(!valid) {
                alert("Por favor selecciona los sabores de tu combo antes de pedir.");
                return;
            }

            msg += "\n━━━━━━━━━━━━━━━━━━━━\n";
            msg += `💰 *TOTAL A PAGAR: ${document.getElementById('total-val').innerText}*\n`;
            msg += "━━━━━━━━━━━━━━━━━━━━\n\n";
            msg += "💳 *DATOS DE PAGO*\n";
            msg += "🔹 Banco Azteca\n";
            msg += "🔹 Leticia Quiroz\n";
            msg += "🔹 CLABE:\n127180016009836868\n\n";
            msg += "🙏 *Envía tu comprobante al terminar.*";

            window.open(`https://api.whatsapp.com/send?phone=5516109449&text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = cargarMenu;
    </script>
</body>
</html>
