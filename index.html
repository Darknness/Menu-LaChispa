<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Chispa - Menú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --yakimechi: #ff6a00;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }
        .accent-font { font-family: 'Bebas Neue', cursive; }
        
        /* Estilo del Acordeón */
        .category-header {
            background: #111;
            border-bottom: 1px solid #222;
            transition: background 0.3s;
        }
        .category-header.active {
            background: #1a1a1a;
            border-bottom: 2px solid var(--yakimechi);
        }
        
        .product-list {
            display: none; /* Oculto por defecto */
            background: #0a0a0a;
        }

        /* Botones de acción */
        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1a1a;
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .btn-action {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--yakimechi);
        }

        #cart-bar {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            background: var(--yakimechi);
            border-radius: 15px;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 25px rgba(255, 106, 0, 0.4);
        }

        /* Animación de flecha */
        .arrow { transition: transform 0.3s; }
        .active .arrow { transform: rotate(180deg); }
    </style>
</head>
<body>

    <header class="py-8 text-center px-4">
        <img src="La%20Chispa%20Logo.png" 
             onerror="this.src='https://raw.githubusercontent.com/lucide-react/lucide/main/icons/utensils.svg'; this.style.filter='invert(1)'"
             class="w-24 h-24 mx-auto mb-2 object-contain">
        <h1 class="accent-font text-5xl text-orange-500">LA CHISPA</h1>
        <p class="text-[10px] tracking-widest text-gray-500 uppercase font-bold">Menú Digital</p>
    </header>

    <main id="contenedor-menu" class="pb-32">
        </main>

    <div id="cart-bar" class="p-4">
        <div class="flex justify-between items-center text-black">
            <div>
                <span id="items-count" class="font-black bg-black/20 px-2 py-1 rounded text-sm">0</span>
                <span id="total-val" class="text-xl font-black ml-2">$0.00</span>
            </div>
            <button onclick="sendWhatsApp()" class="font-black uppercase text-xs border-2 border-black px-4 py-2 rounded-lg">
                PEDIR AHORA
            </button>
        </div>
    </div>

    <script>
        async function cargarMenu() {
            try {
                const respuesta = await fetch('productos.json');
                const productos = await respuesta.json();
                const contenedor = document.getElementById('contenedor-menu');
                
                const categorias = [...new Set(productos.map(p => p.categoria))];

                categorias.forEach(cat => {
                    const section = document.createElement('div');
                    section.className = "mb-2";
                    
                    const catId = cat.replace(/\s+/g, '-');

                    section.innerHTML = `
                        <button onclick="toggleCategory('${catId}')" id="btn-${catId}" 
                                class="category-header w-full p-5 flex justify-between items-center">
                            <span class="accent-font text-2xl tracking-wide uppercase">${cat}</span>
                            <span class="arrow text-orange-500">▼</span>
                        </button>
                        <div id="list-${catId}" class="product-list px-4 divide-y divide-white/5">
                            </div>
                    `;

                    const list = section.querySelector(`#list-${catId}`);
                    productos.filter(p => p.categoria === cat).forEach(p => {
                        list.innerHTML += `
                            <div class="py-4 flex justify-between items-center menu-item" 
                                 data-name="${p.nombre}" data-price="${p.precio}">
                                <div class="pr-4">
                                    <h3 class="font-bold text-sm uppercase text-gray-200">${p.nombre}</h3>
                                    <p class="text-xs text-gray-500 mt-1">${p.descripcion || ''}</p>
                                    <p class="font-black text-orange-500 mt-1">$${p.precio}</p>
                                </div>
                                <div class="qty-control">
                                    <button onclick="changeQty(this, -1)" class="btn-action opacity-20" disabled>-</button>
                                    <span class="qty-val font-bold text-sm">0</span>
                                    <button onclick="changeQty(this, 1)" class="btn-action">+</button>
                                </div>
                            </div>
                        `;
                    });
                    contenedor.appendChild(section);
                });
            } catch (error) {
                console.error(error);
            }
        }

        function toggleCategory(id) {
            const list = document.getElementById(`list-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            const isVisible = list.style.display === 'block';
            
            // Cerrar otros (opcional, si quieres que solo uno esté abierto a la vez)
            // document.querySelectorAll('.product-list').forEach(l => l.style.display = 'none');
            // document.querySelectorAll('.category-header').forEach(b => b.classList.remove('active'));

            list.style.display = isVisible ? 'none' : 'block';
            btn.classList.toggle('active', !isVisible);
        }

        function changeQty(btn, delta) {
            const container = btn.parentElement;
            const valSpan = container.querySelector('.qty-val');
            const minusBtn = container.querySelectorAll('.btn-action')[0];
            
            let current = parseInt(valSpan.innerText);
            current += delta;
            if(current < 0) current = 0;
            
            valSpan.innerText = current;
            minusBtn.disabled = current === 0;
            minusBtn.style.opacity = current === 0 ? "0.2" : "1";
            
            updateTotal();
        }

        function updateTotal() {
            let total = 0, count = 0;
            document.querySelectorAll('.menu-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty-val').innerText);
                if(qty > 0) {
                    total += (parseFloat(item.dataset.price) * qty);
                    count += qty;
                }
            });
            document.getElementById('total-val').innerText = `$${total.toFixed(2)}`;
            document.getElementById('items-count').innerText = count;
            document.getElementById('cart-bar').style.display = count > 0 ? 'block' : 'none';
        }

        function sendWhatsApp() {
            let msg = "🛒 *PEDIDO LA CHISPA*\n\n";
            document.querySelectorAll('.menu-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty-val').innerText);
                if(qty > 0) msg += `• *${qty}x* ${item.dataset.name}\n`;
            });
            msg += `\n💰 *TOTAL: ${document.getElementById('total-val').innerText}*`;
            window.open(`https://wa.me/5516109449?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = cargarMenu;
    </script>
</body>
</html>
