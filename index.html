<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Chispa - Menú Dinámico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores base según tus categorías en la DB */
            --mariscos: #00d2ff;
            --yakimechi: #ff6a00;
            --dulce: #ff00ff;
            --salado: #22c55e;
            --bebidas: #8b4513;
            --default: #ffa500;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            padding-bottom: 120px;
        }
        .accent-font { font-family: 'Bebas Neue', cursive; }
        
        .menu-item {
            background: #151515;
            border-left: 4px solid #333;
            transition: all 0.3s ease;
        }
        
        /* Clases dinámicas de borde según categoría */
        .sec-mariscos .menu-item.active { border-left-color: var(--mariscos); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
        .sec-yakimechi .menu-item.active { border-left-color: var(--yakimechi); box-shadow: 0 0 15px rgba(255, 106, 0, 0.1); }
        .sec-crepas-dulces .menu-item.active, .sec-dulce .menu-item.active { border-left-color: var(--dulce); box-shadow: 0 0 15px rgba(255, 0, 255, 0.1); }
        .sec-crepas-saladas .menu-item.active, .sec-salado .menu-item.active { border-left-color: var(--salado); box-shadow: 0 0 15px rgba(34, 197, 94, 0.1); }

        .qty-input {
            width: 50px;
            background: #222;
            border: 1px solid #444;
            text-align: center;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            padding: 4px 0;
            outline: none;
        }
        .qty-input:disabled { opacity: 0.1; }

        .logo-container {
            background: white;
            border-radius: 50%;
            width: 140px;
            height: 140px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid var(--yakimechi);
            box-shadow: 0 0 30px rgba(255, 106, 0, 0.3);
        }

        #cart-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            border-top: 3px solid var(--yakimechi);
            display: none;
            z-index: 1000;
        }

        .desc-text {
            font-size: 0.75rem;
            color: #888;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="max-w-xl mx-auto min-h-screen bg-[#0d0d0d] shadow-2xl">
        
        <header class="pt-8 pb-6 text-center px-4 bg-gradient-to-b from-orange-500/10 to-transparent">
            <div class="logo-container mb-4">
                <img src="La%20Chispa%20Logo.png" 
                     onerror="this.src='https://raw.githubusercontent.com/lucide-react/lucide/main/icons/utensils.svg'; this.style.filter='invert(1)'"
                     alt="La Chispa Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="accent-font text-6xl text-orange-500 tracking-tighter">LA CHISPA</h1>
            <p class="text-[10px] tracking-[0.4em] text-gray-400 uppercase font-bold">¡El sabor que te hace volver!</p>
        </header>

        <main id="contenedor-menu" class="px-4 space-y-10 pb-20">
            <div class="text-center py-10 text-gray-500">Cargando delicias...</div>
        </main>
    </div>

    <div id="cart-bar" class="p-5">
        <div class="max-w-xl mx-auto flex justify-between items-center px-4">
            <div>
                <p class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">Total del Pedido</p>
                <p id="total-val" class="text-3xl font-black text-white">$0.00</p>
            </div>
            <button onclick="sendWhatsApp()" class="bg-orange-600 text-black px-6 py-3 rounded-xl font-black uppercase text-xs shadow-[0_0_20px_rgba(234,88,12,0.5)]">
                ENVIAR PEDIDO
            </button>
        </div>
    </div>

    <script>
        // 1. CARGA DINÁMICA DESDE EL JSON GENERADO POR TU DB
        async function cargarMenu() {
            try {
                const respuesta = await fetch('productos.json');
                const productos = await respuesta.json();
                const contenedor = document.getElementById('contenedor-menu');
                contenedor.innerHTML = ''; // Limpiar mensaje de carga

                // Obtener categorías únicas presentes en tu tabla 'productos' 
                const categorias = [...new Set(productos.map(p => p.categoria))];

                categorias.forEach(cat => {
                    const section = document.createElement('section');
                    // Crear clase compatible con CSS (ej: "Crepas Dulces" -> "crepas-dulces")
                    const claseCat = cat.toLowerCase().replace(/\s+/g, '-');
                    section.className = `sec-${claseCat} space-y-4`;
                    
                    // Elegir color de acento
                    let colorAcento = `var(--default)`;
                    if(claseCat.includes('marisco')) colorAcento = `var(--mariscos)`;
                    if(claseCat.includes('yakimechi')) colorAcento = `var(--yakimechi)`;
                    if(claseCat.includes('dulce')) colorAcento = `var(--dulce)`;
                    if(claseCat.includes('salado')) colorAcento = `var(--salado)`;
                    if(claseCat.includes('bebidas')) colorAcento = `var(--bebidas)`;

                    section.innerHTML = `
                        <h2 class="accent-font text-3xl mb-4 flex items-center gap-3" style="color: ${colorAcento}">
                            ${cat.toUpperCase()}
                        </h2>
                        <div class="grid gap-3"></div>
                    `;

                    const grid = section.querySelector('div');

                    // Filtrar productos de esta categoría 
                    productos.filter(p => p.categoria === cat).forEach(p => {
                        grid.innerHTML += `
                            <div class="menu-item p-4 rounded-r-xl flex items-center gap-4" 
                                 data-name="${p.nombre}" data-price="${p.precio}">
                                <input type="checkbox" class="w-6 h-6" onchange="toggleItem(this)">
                                <div class="flex-1">
                                    <h3 class="font-bold text-sm italic uppercase">${p.nombre}</h3>
                                    <p class="desc-text mt-1">${p.descripcion || ''}</p>
                                </div>
                                <div class="text-right">
                                    <div class="font-black mb-1" style="color: ${colorAcento}">$${p.precio}</div>
                                    <input type="number" value="1" min="1" max="${p.stock || 10}" 
                                           class="qty-input" disabled onchange="updateTotal()">
                                </div>
                            </div>
                        `;
                    });
                    contenedor.appendChild(section);
                });
            } catch (error) {
                console.error("Error al cargar productos.json:", error);
                document.getElementById('contenedor-menu').innerHTML = 
                    `<p class="text-red-500 text-center">Error al conectar con la base de datos local.</p>`;
            }
        }

        // 2. LÓGICA DEL CARRITO
        function toggleItem(cb) {
            const card = cb.closest('.menu-item');
            const input = card.querySelector('.qty-input');
            if(cb.checked) {
                card.classList.add('active');
                input.disabled = false;
                if(input.value < 1) input.value = 1;
            } else {
                card.classList.remove('active');
                input.disabled = true;
            }
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            let itemsCount = 0;
            document.querySelectorAll('.menu-item').forEach(item => {
                const cb = item.querySelector('input[type="checkbox"]');
                if(cb && cb.checked) {
                    const price = parseFloat(item.dataset.price);
                    const qty = parseInt(item.querySelector('.qty-input').value) || 0;
                    total += (price * qty);
                    itemsCount++;
                }
            });
            document.getElementById('total-val').innerText = `$${total.toFixed(2)}`;
            document.getElementById('cart-bar').style.display = itemsCount > 0 ? 'block' : 'none';
        }

        // 3. ENVÍO A WHATSAPP
        function sendWhatsApp() {
            let msg = "🐶 *PEDIDO LA CHISPA* 🐶\n\n";
            let total = 0;
            document.querySelectorAll('.menu-item').forEach(item => {
                const cb = item.querySelector('input[type="checkbox"]');
                if(cb && cb.checked) {
                    const qty = item.querySelector('.qty-input').value;
                    const name = item.dataset.name;
                    const price = parseFloat(item.dataset.price);
                    const sub = price * qty;
                    msg += `✅ *${qty}x* ${name} - ($${sub.toFixed(2)})\n`;
                    total += sub;
                }
            });
            msg += `\n💰 *TOTAL A PAGAR: $${total.toFixed(2)}*`;
            msg += `\n\n_¡Gracias por tu pedido!_`;
            window.open(`https://wa.me/5516109449?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Iniciar carga al abrir
        window.onload = cargarMenu;
    </script>
</body>
</html>
